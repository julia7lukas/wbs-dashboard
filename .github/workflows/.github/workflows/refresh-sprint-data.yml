name: Daily Sprint Data Refresh

on:
  schedule:
    # 6am CT = 11am UTC (CST) or 12pm UTC (CDT)
    # Using 11:00 UTC to cover CST; adjust to 12:00 in summer if needed
    - cron: '0 11 * * 1-5'   # Weekdays only
  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch sprint data from Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: https://veradigm.atlassian.net
        run: python scripts/fetch_jira_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto refresh: sprint data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
