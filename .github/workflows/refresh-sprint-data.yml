name: Daily Sprint Data Refresh

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 6am CT (11am UTC)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch sprint data from Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: https://veradigm.atlassian.net
        run: python scripts/fetch_jira_data.py

      - name: Inject write token into index.html
        env:
          WRITE_TOKEN: ${{ secrets.DASHBOARD_WRITE_TOKEN }}
        run: |
          # Inject __ENV__ script tag just before </head>
          sed -i "s|</head>|<script>window.__ENV__={WRITE_TOKEN:'${WRITE_TOKEN}'};</script></head>|" index.html

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --cached --quiet || git commit -m "Auto refresh: sprint data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
