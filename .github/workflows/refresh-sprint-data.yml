name: Sprint Data Refresh

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Jira data
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_CAPACITY_TOKEN: ${{ secrets.GH_CAPACITY_TOKEN }}
        run: python scripts/fetch_jira_data.py

      - name: Build site
        run: |
          mkdir -p _site
          cp index.html dashboard.js data.json capacity.json _site/
          # env.js is generated by fetch_jira_data.py at runtime
          if [ -f env.js ]; then
            cp env.js _site/
          else
            echo "window.__ENV__ = {};" > _site/env.js
            echo "WARNING: env.js not found, using empty fallback"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
