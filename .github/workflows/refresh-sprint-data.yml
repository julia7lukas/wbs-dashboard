name: Sprint Data Refresh

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Jira data
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GH_CAPACITY_TOKEN: ${{ secrets.GH_CAPACITY_TOKEN }}
        run: python scripts/fetch_jira_data.py

      - name: Build site
        run: |
          mkdir -p _site
          cp index.html dashboard.js data.json capacity.json chart.umd.js _site/
          # env.js is generated by fetch_jira_data.py at runtime
          if [ -f env.js ]; then
            cp env.js _site/
          else
            echo "window.__ENV__ = {};" > _site/env.js
            echo "WARNING: env.js not found, using empty fallback"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = 'Sprint Data Refresh: workflow failed';
            const runUrl = process.env.RUN_URL;
            const body = [
              'The **Sprint Data Refresh** workflow failed.',
              '',
              'Run: ' + runUrl,
              '',
              'Common causes:',
              '- Jira API token expired — check the `JIRA_API_TOKEN` repo secret',
              '- Jira credentials invalid (`JIRA_EMAIL` / `JIRA_BASE_URL`)',
              '- GitHub Pages deployment error',
              '',
              'Check the run above for the exact step that failed.'
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure'
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: 'Workflow failed again: ' + runUrl
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['workflow-failure']
              });
            }
